name: Wanderlust CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend Image
        run: |
          docker build -t dev.pushpendra/wanderlust-backend:${{ github.run_number }} ./backend
          docker tag dev.pushpendra/wanderlust-backend:${{ github.run_number }} dev.pushpendra/wanderlust-backend:latest

      - name: Build Frontend Image
        run: |
          docker build -t dev.pushpendra/wanderlust-frontend:${{ github.run_number }} ./frontend
          docker tag dev.pushpendra/wanderlust-frontend:${{ github.run_number }} dev.pushpendra/wanderlust-frontend:latest

      - name: Push Backend Image
        run: |
          docker push dev.pushpendra/wanderlust-backend:${{ github.run_number }}
          docker push dev.pushpendra/wanderlust-backend:latest

      - name: Push Frontend Image
        run: |
          docker push dev.pushpendra/wanderlust-frontend:${{ github.run_number }}
          docker push dev.pushpendra/wanderlust-frontend:latest
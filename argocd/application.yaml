apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: wanderlust
  namespace: argocd

spec:
  project: wanderlust

  source:
    repoURL: https://github.com/pushpendra-singh1176/wanderlust-infrastructure.git
    targetRevision: main
    path: kubernetes

  destination:
    server: https://kubernetes.default.svc
    namespace: wanderlust

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
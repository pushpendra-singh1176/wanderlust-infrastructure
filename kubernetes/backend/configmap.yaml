apiVersion: v1
kind: ConfigMap

metadata:
  name: backend-config
  namespace: wanderlust

  labels:
    app: wanderlust-backend
    tier: backend

data:
  NODE_ENV: "production"

  PORT: "5000"

  FRONTEND_URL: "http://frontend-service"

  MONGO_HOST: "mongodb-service"

  MONGO_PORT: "27017"

  REDIS_HOST: "redis-service"

  REDIS_PORT: "6379"

  DATABASE_NAME: "wanderlust"